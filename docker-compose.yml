services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./auth-api"]
    ports:
      - "8080:8080"
      - "6060:6060"
    environment:
      - DB_URL=postgresql://app_user:secret@pgbouncer:6432/auth_db?sslmode=disable&pool_max_conns=${APP_DB_POOL_MAX_CONNS:-128}
      - SERVER_ADDRESS=0.0.0.0:8080
      - SERVER_PREFORK=${SERVER_PREFORK:-true}
      - TOKEN_SYMMETRIC_KEY=12345678901234567890123456789012
      - REGISTRATION_BATCH_SIZE=${REGISTRATION_BATCH_SIZE:-100}
      - REGISTRATION_BATCH_WAIT=${REGISTRATION_BATCH_WAIT:-10ms}
      - LOG_LEVEL=warn
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    sysctls:
      - net.ipv4.tcp_max_syn_backlog=8192
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.tcp_fin_timeout=10
      - net.ipv4.ip_local_port_range=10000 65000
    depends_on:
      pgbouncer:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    networks:
      - auth_network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URL=postgresql://app_user:secret@db:5432/auth_db?sslmode=disable
      - PGBOUNCER_PORT=${PGBOUNCER_PORT:-6432}
      - PGBOUNCER_POOL_MODE=${PGBOUNCER_POOL_MODE:-transaction}
      - PGBOUNCER_MAX_CLIENT_CONN=${PGBOUNCER_MAX_CLIENT_CONN:-10000}
      - PGBOUNCER_DEFAULT_POOL_SIZE=${PGBOUNCER_DEFAULT_POOL_SIZE:-100}
      - PGBOUNCER_MIN_POOL_SIZE=${PGBOUNCER_MIN_POOL_SIZE:-0}
      - PGBOUNCER_RESERVE_POOL_SIZE=${PGBOUNCER_RESERVE_POOL_SIZE:-0}
      - PGBOUNCER_IGNORE_STARTUP_PARAMETERS=${PGBOUNCER_IGNORE_STARTUP_PARAMETERS:-extra_float_digits,prefer_simple_protocol}
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./userlist.txt:/etc/pgbouncer/userlist.txt
    networks:
      - auth_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=${POSTGRES_MAX_CONNECTIONS:-256}", "-c", "shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB}", "-c", "synchronous_commit=${POSTGRES_SYNCHRONOUS_COMMIT:-off}", "-c", "full_page_writes=${POSTGRES_FULL_PAGE_WRITES:-off}", "-c", "checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-15min}", "-c", "checkpoint_completion_target=${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.95}", "-c", "wal_buffers=${POSTGRES_WAL_BUFFERS:-64MB}", "-c", "effective_io_concurrency=${POSTGRES_EFFECTIVE_IO_CONCURRENCY:-32}"]
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth_network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks:
      - auth_network

  migrations:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command: -path=/migrations -database="postgresql://app_user:secret@db:5432/auth_db?sslmode=disable" up
    depends_on:
      db:
        condition: service_healthy
    networks:
      - auth_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./auth-worker"]
    environment:
      - DB_URL=postgresql://app_user:secret@pgbouncer:6432/auth_db?sslmode=disable&pool_max_conns=${WORKER_DB_POOL_MAX_CONNS:-4}
      - TOKEN_SYMMETRIC_KEY=12345678901234567890123456789012
      - GOMAXPROCS=${WORKER_GOMAXPROCS:-1}
      - GOMEMLIMIT=${WORKER_GOMEMLIMIT:-256MiB}
      - WORKER_INTERVAL=${WORKER_INTERVAL:-5s}
      - WORKER_UPGRADE_LIMIT=${WORKER_UPGRADE_LIMIT:-4}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - auth_network


  k6:
    image: grafana/k6
    profiles: ["loadtest"]
    volumes:
      - ./load-test-reg-only.js:/load-test.js
    command: run /load-test.js --vus 500 --duration 60s
    depends_on:
      app:
        condition: service_started
    networks:
      - auth_network

volumes:
  pgdata:

networks:
  auth_network:
    driver: bridge
