version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./auth-api"]
    ports:
      - "8080:8080"
      - "6060:6060"
    environment:
      - DB_URL=postgresql://app_user:secret@pgbouncer:6432/auth_db?sslmode=disable&pool_max_conns=500
      - SERVER_ADDRESS=0.0.0.0:8080
      - SERVER_PREFORK=true
      - TOKEN_SYMMETRIC_KEY=12345678901234567890123456789012
      - LOG_LEVEL=warn
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    sysctls:
      - net.ipv4.tcp_max_syn_backlog=8192
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.tcp_fin_timeout=10
      - net.ipv4.ip_local_port_range=10000 65000
    depends_on:
      pgbouncer:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    networks:
      - auth_network

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URL=postgresql://app_user:secret@db:5432/auth_db?sslmode=disable
      - PGBOUNCER_PORT=6432
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_MAX_CLIENT_CONN=10000
      - PGBOUNCER_DEFAULT_POOL_SIZE=300
      - PGBOUNCER_MIN_POOL_SIZE=100
      - PGBOUNCER_RESERVE_POOL_SIZE=50
      - PGBOUNCER_IGNORE_STARTUP_PARAMETERS=extra_float_digits,prefer_simple_protocol
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./userlist.txt:/etc/pgbouncer/userlist.txt
    networks:
      - auth_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=1000", "-c", "shared_buffers=512MB", "-c", "synchronous_commit=off", "-c", "full_page_writes=off", "-c", "checkpoint_timeout=15min"]
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth_network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks:
      - auth_network

  migrations:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command: -path=/migrations -database="postgresql://app_user:secret@db:5432/auth_db?sslmode=disable" up
    depends_on:
      db:
        condition: service_healthy
    networks:
      - auth_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./auth-worker"]
    environment:
      - DB_URL=postgresql://app_user:secret@pgbouncer:6432/auth_db?sslmode=disable&pool_max_conns=4
      - TOKEN_SYMMETRIC_KEY=12345678901234567890123456789012
      - GOMAXPROCS=1
      - GOMEMLIMIT=256MiB
      - WORKER_INTERVAL=5s
      - WORKER_UPGRADE_LIMIT=4
    depends_on:
      db:
        condition: service_healthy
    networks:
      - auth_network


  k6:
    image: grafana/k6
    volumes:
      - ./load-test-reg-only.js:/load-test.js
    command: run /load-test.js --vus 500 --duration 60s
    depends_on:
      app:
        condition: service_started
    networks:
      - auth_network

volumes:
  pgdata:

networks:
  auth_network:
    driver: bridge
